<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CandySweet</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Segoe UI", "Microsoft JhengHei", sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 30px 16px;
            background: linear-gradient(135deg, #ffe4ef 0%, #f6e8ff 50%, #eaf4ff 100%);
        }

        .box {
            width: 100%;
            max-width: 850px;
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(10px);
            border-radius: 28px;
            padding: 40px 28px;
            box-shadow: 0 18px 40px rgba(95, 72, 124, 0.15);
        }

        h1 {
            text-align: center;
            font-size: clamp(2rem, 5vw, 3rem);
            color: #7a2f71;
            margin-bottom: 28px;
        }

        .menu {
            display: grid;
            gap: 18px;
        }

        .menu a {
            display: block;
            text-decoration: none;
            color: #3d2b4f;
            background: rgba(255, 255, 255, 0.9);
            padding: 20px 22px;
            border-radius: 18px;
            font-size: 1.1rem;
            font-weight: 600;
            box-shadow: 0 8px 20px rgba(95, 72, 124, 0.10);
            transition: 0.25s ease;
        }

        .menu a:hover {
            transform: translateY(-5px);
            background: linear-gradient(135deg, #ffe4ef, #eee3ff);
            box-shadow: 0 16px 28px rgba(95, 72, 124, 0.16);
        }

        @media (max-width: 640px) {
            .box {
                padding: 28px 18px;
            }

            .menu a {
                font-size: 1rem;
                padding: 16px 16px;
            }
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>hello MyFriend</h1>

        <div class="menu">
            <a href="sketchfab.html">bodoh</a>
            <a href="0.babylonViewer Basic.html">Babylon Viewer Basic</a>
            <a href="1.babylonViewer Select.html">Babylon Viewer Select</a>
            <a href="2.babylonViewer Navbar.html">Babylon Viewer Navbar</a>
        </div>
    </div>
</body>
</html>
